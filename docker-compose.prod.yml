##
## Pulse — Production Docker Compose
##
## Usage:
##   docker compose -f docker-compose.prod.yml up -d
##
## Requires a .env file at repo root with all variables from .env.production.example
##

services:

  # ── Infrastructure ──────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: pulse-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-pulse}
      POSTGRES_USER:     ${POSTGRES_USER:-pulse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pulse}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  redis:
    image: redis:7-alpine
    container_name: pulse-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - internal

  # ── Applications ────────────────────────────────────────────────────────────

  api:
    image: ghcr.io/shivanshshekhar11/pulse-api:latest
    container_name: pulse-api
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV:     production
      DATABASE_URL: postgresql://${POSTGRES_USER:-pulse}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-pulse}
      REDIS_URL:    redis://:${REDIS_PASSWORD}@redis:6379
      API_PORT:     "4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:4000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 512m

  dashboard:
    image: ghcr.io/shivanshshekhar11/pulse-dashboard:latest
    container_name: pulse-dashboard
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      PORT:     "3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 256m

  docs:
    image: ghcr.io/shivanshshekhar11/pulse-docs:latest
    container_name: pulse-docs
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      PORT:     "3001"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 256m

  example:
    image: ghcr.io/shivanshshekhar11/pulse-example:latest
    container_name: pulse-example
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      PORT:     "3002"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3002 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 256m

  # ── Reverse Proxy ────────────────────────────────────────────────────────────

  nginx:
    image: nginx:alpine
    container_name: pulse-nginx
    restart: unless-stopped
    command: "/bin/sh -c 'while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g \"daemon off;\"'"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot-www:/var/www/certbot:ro
      - certbot-certs:/etc/letsencrypt:ro
    depends_on:
      - api
      - dashboard
      - docs
      - example
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 64m

  # ── SSL (Certbot) ─────────────────────────────────────────────────────────
  certbot:
    image: certbot/certbot
    container_name: pulse-certbot
    volumes:
      - certbot-www:/var/www/certbot
      - certbot-certs:/etc/letsencrypt
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done"
    networks:
      - internal

volumes:
  pgdata:
  redisdata:
  certbot-www:
  certbot-certs:

networks:
  internal:
    driver: bridge
