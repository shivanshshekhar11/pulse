name: Build and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  OWNER: shivanshshekhar11

jobs:
  # ── Build all four images in parallel ─────────────────────────────────────
  build-api:
    name: Build API
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - name: Build and push API
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/api/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.OWNER }}/pulse-api:latest
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

  build-dashboard:
    name: Build Dashboard
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - name: Build and push Dashboard
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/dashboard/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.OWNER }}/pulse-dashboard:latest
          cache-from: type=gha,scope=dashboard
          cache-to: type=gha,mode=max,scope=dashboard
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_DASHBOARD_URL=${{ vars.NEXT_PUBLIC_DASHBOARD_URL }}
            NEXT_PUBLIC_DOCS_URL=${{ vars.NEXT_PUBLIC_DOCS_URL }}
            NEXT_PUBLIC_EXAMPLE_URL=${{ vars.NEXT_PUBLIC_EXAMPLE_URL }}

  build-docs:
    name: Build Docs
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - name: Build and push Docs
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/docs/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.OWNER }}/pulse-docs:latest
          cache-from: type=gha,scope=docs
          cache-to: type=gha,mode=max,scope=docs
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_DASHBOARD_URL=${{ vars.NEXT_PUBLIC_DASHBOARD_URL }}
            NEXT_PUBLIC_DOCS_URL=${{ vars.NEXT_PUBLIC_DOCS_URL }}
            NEXT_PUBLIC_EXAMPLE_URL=${{ vars.NEXT_PUBLIC_EXAMPLE_URL }}

  build-example:
    name: Build Example
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - name: Build and push Example
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/example/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.OWNER }}/pulse-example:latest
          cache-from: type=gha,scope=example
          cache-to: type=gha,mode=max,scope=example
          build-args: |
            NEXT_PUBLIC_PULSE_API_KEY=${{ vars.NEXT_PUBLIC_PULSE_API_KEY }}
            NEXT_PUBLIC_PULSE_URL=${{ vars.NEXT_PUBLIC_PULSE_URL }}
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_DASHBOARD_URL=${{ vars.NEXT_PUBLIC_DASHBOARD_URL }}
            NEXT_PUBLIC_DOCS_URL=${{ vars.NEXT_PUBLIC_DOCS_URL }}
            NEXT_PUBLIC_EXAMPLE_URL=${{ vars.NEXT_PUBLIC_EXAMPLE_URL }}

  # ── Deploy after all four images are ready ────────────────────────────────
  deploy:
    name: Deploy to Droplet
    needs: [build-api, build-dashboard, build-docs, build-example]
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to DigitalOcean Droplet
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USERNAME }}
          key: ${{ secrets.DO_SSH_KEY }}
          script: |
            # 1. Navigate to the project directory
            cd ~/projects/pulse

            # 2. Pull the latest code (for docker-compose / nginx changes)
            git pull origin main

            # 3. Pull the fresh images from GHCR
            docker compose -f docker-compose.prod.yml pull

            # 4. Run database migrations before restarting containers
            docker compose -f docker-compose.prod.yml run --rm api sh -c "cd /app/apps/api && npx drizzle-kit migrate" || echo "⚠ Migration step skipped or failed"

            # 5. Restart the full stack with new images
            docker compose -f docker-compose.prod.yml up -d

            # 6. Prune dangling images to reclaim disk space
            docker image prune -f
