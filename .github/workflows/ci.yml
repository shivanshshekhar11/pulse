name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Browsers
        run: pnpm exec playwright install --with-deps
        working-directory: apps/example

      - name: Start services (Docker Compose)
        run: docker compose up -d

      - name: Wait for Postgres to be healthy
        run: |
          echo "Waiting for Postgres..."
          until docker compose exec -T postgres pg_isready -U pulse; do
            sleep 1
          done
          echo "Postgres is ready."

      - name: Run DB migrations
        run: pnpm --filter @pulse-flags/api db:migrate
        env:
          DATABASE_URL: postgresql://pulse:pulse@localhost:5432/pulse

      - name: Seed Database
        run: pnpm --filter @pulse-flags/api db:seed
        env:
          DATABASE_URL: postgresql://pulse:pulse@localhost:5432/pulse

      - name: Lint
        run: pnpm run lint

      - name: Build
        run: pnpm run build

      - name: Unit Tests
        run: pnpm run test

      - name: E2E Tests
        run: pnpm run test:e2e
        env:
          DATABASE_URL: postgresql://pulse:pulse@localhost:5432/pulse
          REDIS_URL: redis://localhost:6379

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/example/playwright-report/
          retention-days: 14
