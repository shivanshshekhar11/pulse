worker_processes auto;
events {
    worker_connections 1024;
}

http {
    include mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;
    limit_req_zone $binary_remote_addr zone=web:10m rate=120r/m;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    # HTTP → HTTPS redirect
    # Uncomment ONLY after Certbot has issued a certificate.
    server {
        listen 80 default_server;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ── API (api.pulseflags.live) ─────────────────────────────────────────────
    server {
        # listen 80;
        listen 443 ssl;
        server_name api.pulseflags.live;

        ssl_certificate     /etc/letsencrypt/live/pulseflags.live/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/pulseflags.live/privkey.pem;

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;

        client_max_body_size 10m;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # SSE stream — must be configured before the catch-all location block
        location /sdk/v1/stream {
            limit_req zone=api burst=20 nodelay;
            proxy_pass         http://api:4000;
            proxy_http_version 1.1;
            # Disable keep-alive so each SSE connection gets its own upstream
            proxy_set_header   Connection        "";
            proxy_buffering    off;
            proxy_cache        off;
            chunked_transfer_encoding off;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            # SSE connections stay open — raise timeout well above the 30s heartbeat
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
            # Tell Nginx not to buffer — critical for SSE through Nginx
            add_header         X-Accel-Buffering no;
        }

        location / {
            limit_req zone=api burst=20 nodelay;
            proxy_pass         http://api:4000;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
        }
    }

    # ── Dashboard (pulseflags.live) ──────────────────────────────────────
    server {
        # listen 80;
        listen 443 ssl;
        server_name pulseflags.live;

        ssl_certificate     /etc/letsencrypt/live/pulseflags.live/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/pulseflags.live/privkey.pem;

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options        "SAMEORIGIN"   always;
        add_header X-Content-Type-Options "nosniff"      always;
        add_header X-XSS-Protection       "1; mode=block" always;
        add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

        client_max_body_size 10m;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            limit_req zone=web burst=30 nodelay;
            proxy_pass         http://dashboard:3000;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }

    # ── Docs (docs.pulseflags.live) ───────────────────────────────────────────
    server {
        # listen 80;
        listen 443 ssl;
        server_name docs.pulseflags.live;

        ssl_certificate     /etc/letsencrypt/live/pulseflags.live/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/pulseflags.live/privkey.pem;

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            limit_req zone=web burst=30 nodelay;
            proxy_pass         http://docs:3001;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }

    # ── Example / Demo (demo.pulseflags.live) ────────────────────────────────
    server {
        # listen 80;
        listen 443 ssl;
        server_name demo.pulseflags.live;

        ssl_certificate     /etc/letsencrypt/live/pulseflags.live/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/pulseflags.live/privkey.pem;

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            limit_req zone=web burst=30 nodelay;
            proxy_pass         http://example:3002;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }
}
